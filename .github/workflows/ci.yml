name: InterviewHub CI Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-validate:
    name: Continuous Integration
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout Repository
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 2. Setup Node.js Environment
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json

      # 3. Install Backend Dependencies
      - name: Install Backend Dependencies
        working-directory: ./backend
        run: npm install

      # 4. Validate Backend
      - name: Validate Backend Setup
        working-directory: ./backend
        run: npx prisma generate

      # 5. Install Frontend Dependencies
      - name: Install Frontend Dependencies
        working-directory: ./frontend
        run: npm install

      # 6. Build Frontend Application
      - name: Build Frontend
        working-directory: ./frontend
        run: npm run build

      # 7. Log in to Docker Hub
      - name: Log in to Docker Hub
        # Only run this step if we are on the main branch (optional constraint, but good practice)
        if: github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 8. Build and Push Backend Docker Image
      - name: Build and Push Backend Docker Image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          # Only push if it's the main branch, otherwise just build to validate
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/interviewhub-backend:${{ github.sha }}
            ${{ secrets.DOCKER_USERNAME }}/interviewhub-backend:latest

      # 9. Build and Push Frontend Docker Image
      - name: Build and Push Frontend Docker Image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/interviewhub-frontend:${{ github.sha }}
            ${{ secrets.DOCKER_USERNAME }}/interviewhub-frontend:latest
